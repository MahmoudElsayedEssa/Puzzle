<svg viewBox="0 0 480 320" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <title>One curve, two pieces: a TAB is the matching BLANK</title>
  <rect width="480" height="320" fill="#ffffff"/>
  <text x="240" y="30" text-anchor="middle" font-size="17" font-weight="700" fill="#2B2B33">The knob: one curve, two matching pieces</text>

  <!-- top piece (blue) gets the BLANK; its bottom edge follows the curve, which bulges up into it -->
  <path d="M80,60 L80,180 C176,180 176,80 176,80 C176,40 206,30 230,30 C254,30 284,40 284,80 C284,180 380,180 380,180 L380,60 Z"
        fill="#5B8DEF" fill-opacity="0.18" stroke="none"/>
  <!-- bottom piece (orange) gets the TAB sticking up -->
  <path d="M80,180 C176,180 176,80 176,80 C176,40 206,30 230,30 C254,30 284,40 284,80 C284,180 380,180 380,180 L380,250 L80,250 Z"
        fill="#F4A259" fill-opacity="0.22" stroke="none"/>
  <!-- the cut line itself -->
  <path d="M80,180 C176,180 176,80 176,80 C176,40 206,30 230,30 C254,30 284,40 284,80 C284,180 380,180 380,180"
        fill="none" stroke="#5B6172" stroke-width="2.2"/>

  <!-- apex marker -->
  <circle cx="230" cy="30" r="3.5" fill="#C95A7E"/>
  <line x1="230" y1="30" x2="320" y2="18" stroke="#C95A7E" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="324" y="16" font-size="11.5" font-weight="600" fill="#C95A7E">apex  t=0.5, o=0.37</text>

  <!-- labels -->
  <text x="230" y="118" text-anchor="middle" font-size="14" font-weight="700" fill="#B96A20">TAB</text>
  <text x="230" y="218" text-anchor="middle" font-size="13" font-weight="700" fill="#33559E">BLANK</text>
  <text x="120" y="172" font-size="10.5" fill="#7A8194">shoulder</text>
  <text x="300" y="172" font-size="10.5" fill="#7A8194">shoulder</text>

  <text x="240" y="288" text-anchor="middle" font-size="12.5" fill="#2B2B33">Both pieces are drawn from the <tspan font-style="italic">same</tspan> curve — the math guarantees</text>
  <text x="240" y="306" text-anchor="middle" font-size="12.5" fill="#2B2B33">a TAB on one side is the exact BLANK on the other, so they interlock with no seam.</text>
</svg>
