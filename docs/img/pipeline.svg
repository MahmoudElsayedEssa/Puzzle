<svg viewBox="0 0 960 170" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <title>How a typed number becomes a rendered puzzle</title>
  <rect width="960" height="170" fill="#ffffff"/>
  <text x="480" y="26" text-anchor="middle" font-size="17" font-weight="700" fill="#2B2B33">From a number to a puzzle — 6 steps</text>

  <!-- cards -->
  <g>
    <!-- 1 -->
    <rect x="12" y="48" width="140" height="92" rx="14" fill="#F6F7FF" stroke="#E3E7F5"/>
    <rect x="12" y="48" width="140" height="8" rx="4" fill="#5B8DEF"/>
    <circle cx="34" cy="78" r="11" fill="#5B8DEF"/><text x="34" y="82" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">1</text>
    <text x="82" y="100" text-anchor="middle" font-size="16" font-weight="700" fill="#2B2B33">Type N</text>
    <text x="82" y="120" text-anchor="middle" font-size="11" fill="#7A8194">2–49</text>
    <!-- 2 -->
    <rect x="169" y="48" width="140" height="92" rx="14" fill="#F1FBF7" stroke="#D6F0E7"/>
    <rect x="169" y="48" width="140" height="8" rx="4" fill="#41B3A3"/>
    <circle cx="191" cy="78" r="11" fill="#41B3A3"/><text x="191" y="82" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">2</text>
    <text x="239" y="100" text-anchor="middle" font-size="16" font-weight="700" fill="#2B2B33">Plan</text>
    <text x="239" y="120" text-anchor="middle" font-size="11" fill="#7A8194">grid + band</text>
    <!-- 3 -->
    <rect x="326" y="48" width="140" height="92" rx="14" fill="#FFF7EF" stroke="#FAE6D2"/>
    <rect x="326" y="48" width="140" height="8" rx="4" fill="#F4A259"/>
    <circle cx="348" cy="78" r="11" fill="#F4A259"/><text x="348" y="82" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">3</text>
    <text x="396" y="100" text-anchor="middle" font-size="16" font-weight="700" fill="#2B2B33">Fine grid</text>
    <text x="396" y="120" text-anchor="middle" font-size="11" fill="#7A8194">cells → pieces</text>
    <!-- 4 -->
    <rect x="483" y="48" width="140" height="92" rx="14" fill="#F8F4FD" stroke="#E9DDF7"/>
    <rect x="483" y="48" width="140" height="8" rx="4" fill="#9B72CF"/>
    <circle cx="505" cy="78" r="11" fill="#9B72CF"/><text x="505" y="82" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">4</text>
    <text x="553" y="100" text-anchor="middle" font-size="16" font-weight="700" fill="#2B2B33">Trace</text>
    <text x="553" y="120" text-anchor="middle" font-size="11" fill="#7A8194">piece outlines</text>
    <!-- 5 -->
    <rect x="640" y="48" width="140" height="92" rx="14" fill="#FDF2F6" stroke="#F6D9E4"/>
    <rect x="640" y="48" width="140" height="8" rx="4" fill="#E07A9B"/>
    <circle cx="662" cy="78" r="11" fill="#E07A9B"/><text x="662" y="82" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">5</text>
    <text x="710" y="100" text-anchor="middle" font-size="16" font-weight="700" fill="#2B2B33">Knobs</text>
    <text x="710" y="120" text-anchor="middle" font-size="11" fill="#7A8194">interlock</text>
    <!-- 6 -->
    <rect x="797" y="48" width="140" height="92" rx="14" fill="#EFFAF8" stroke="#D2EFEA"/>
    <rect x="797" y="48" width="140" height="8" rx="4" fill="#2BB3A3"/>
    <circle cx="819" cy="78" r="11" fill="#2BB3A3"/><text x="819" y="82" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">6</text>
    <text x="867" y="100" text-anchor="middle" font-size="16" font-weight="700" fill="#2B2B33">Render</text>
    <text x="867" y="120" text-anchor="middle" font-size="11" fill="#7A8194">clip image</text>
  </g>

  <!-- chevrons -->
  <g stroke="#B9C0D0" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M157 88 l6 6 l-6 6"/>
    <path d="M314 88 l6 6 l-6 6"/>
    <path d="M471 88 l6 6 l-6 6"/>
    <path d="M628 88 l6 6 l-6 6"/>
    <path d="M785 88 l6 6 l-6 6"/>
  </g>
</svg>
