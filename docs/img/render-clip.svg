<svg viewBox="0 0 580 240" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <title>One bitmap, N clips: each piece clips the same image to its outline</title>
  <defs>
    <clipPath id="pieceClip">
      <!-- a knobbed square piece outline -->
      <path d="M400,70 L400,110 C420,110 420,90 440,90 C460,90 460,110 480,110 L480,150
               C500,150 500,170 480,170 L480,200 L440,200 C440,180 420,180 420,200 L400,200 Z"/>
    </clipPath>
  </defs>
  <rect width="580" height="240" fill="#ffffff"/>
  <text x="290" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#2B2B33">Rendering: one image, clipped per piece</text>

  <!-- Stage 1: the whole image -->
  <g>
    <rect x="40" y="60" width="140" height="140" rx="8" fill="#EAF0FB"/>
    <circle cx="85" cy="105" r="32" fill="#F4A259" fill-opacity="0.8"/>
    <circle cx="150" cy="150" r="40" fill="#5B8DEF" fill-opacity="0.75"/>
    <circle cx="70" cy="170" r="22" fill="#57C5A3" fill-opacity="0.8"/>
    <rect x="40" y="60" width="140" height="140" rx="8" fill="none" stroke="#C9CDD6" stroke-width="1.5"/>
    <text x="110" y="222" text-anchor="middle" font-size="12.5" font-weight="600" fill="#2B2B33">1 bitmap</text>
  </g>

  <!-- arrow + label -->
  <g stroke="#B9C0D0" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M196 130 h150"/><path d="M340 124 l8 6 l-8 6"/>
  </g>
  <text x="271" y="120" text-anchor="middle" font-size="11.5" font-weight="600" fill="#7A8194">clipPath(contour)</text>

  <!-- Stage 2: same image, clipped to the piece outline -->
  <g clip-path="url(#pieceClip)">
    <rect x="380" y="60" width="140" height="140" fill="#EAF0FB"/>
    <circle cx="425" cy="105" r="32" fill="#F4A259" fill-opacity="0.85"/>
    <circle cx="490" cy="150" r="40" fill="#5B8DEF" fill-opacity="0.8"/>
    <circle cx="410" cy="170" r="22" fill="#57C5A3" fill-opacity="0.85"/>
  </g>
  <path d="M400,70 L400,110 C420,110 420,90 440,90 C460,90 460,110 480,110 L480,150
           C500,150 500,170 480,170 L480,200 L440,200 C440,180 420,180 420,200 L400,200 Z"
        fill="none" stroke="#5B6172" stroke-width="2"/>
  <text x="448" y="222" text-anchor="middle" font-size="12.5" font-weight="600" fill="#2B2B33">= one piece</text>
</svg>
